start_zone_mowing:
  name: Start zone mowing
  description: Start mowing for one or more explicit zone IDs.
  target:
    entity:
      integration: dreame_mower
      domain: lawn_mower
  fields:
    zone_ids:
      name: Zone IDs
      description: List of zone IDs to mow, for example [1, 3].
      required: true
      example: [1, 3]

start_edge_mowing:
  name: Start edge mowing
  description: Start mowing the edges for one or more explicit contour IDs.
  target:
    entity:
      integration: dreame_mower
      domain: lawn_mower
  fields:
    contour_ids:
      name: Contour IDs
      description: >-
        List of contour ID pairs to mow, for example [[1, 0], [2, 0]]. Available
        contour IDs are exposed in the mower entity's contours attribute once the
        map has been fetched.
      required: true
      example: [[1, 0], [2, 0]]

start_spot_mowing:
  name: Start spot mowing
  description: Start mowing for one or more explicit spot area IDs.
  target:
    entity:
      integration: dreame_mower
      domain: lawn_mower
  fields:
    spot_area_ids:
      name: Spot area IDs
      description: List of spot area IDs to mow, for example [2, 4].
      required: true
      example: [2, 4]
